<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fireworks</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at bottom, #0a0a0a, #000);
  overflow: hidden;
  font-family: Arial, sans-serif;
}

nav {
  position: fixed;
  top: 0;
  width: auto; /* moins large */
  max-width: 400px; /* limite largeur */
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  padding: 8px 12px;
  display: flex;
  justify-content: center;
  gap: 8px;
  border-radius: 12px;
  z-index: 10;
}

input, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}

button {
  background: #ff3b3b;
  color: white;
  cursor: pointer;
}

canvas { display: block; }

#signature {
  position: fixed;
  bottom: 10px;
  right: 10px;
  color: white;
  font-family: Arial, sans-serif;
  font-size: 14px;
  opacity: 0.7;
  pointer-events: none;
}
</style>
</head>

<body>

<nav>
  <input id="textInput" placeholder="Ton texte (LOVE)">
  <button onclick="launch()">Lancer 🎆</button>
</nav>

<canvas id="c"></canvas>
<div id="signature">@serpent_25200</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let rockets = [];
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function launch() {
  const text = document.getElementById('textInput').value || "LOVE";
  const spacing = canvas.width / (text.length + 1);

  for (let i = 0; i < text.length; i++) {
    rockets.push({
      x: spacing * (i + 1),
      y: canvas.height,
      targetY: canvas.height / 3,
      char: text[i],
      speed: 8 + Math.random() * 2
    });
  }
}

function createExplosion(x, y, char) {
  const off = document.createElement('canvas');
  const offCtx = off.getContext('2d');

  off.width = 300;
  off.height = 300;

  offCtx.fillStyle = "white";
  offCtx.font = "bold 220px Arial";
  offCtx.textAlign = "center";
  offCtx.fillText(char, 150, 220);

  const data = offCtx.getImageData(0, 0, 300, 300).data;

  for (let y2 = 0; y2 < 300; y2 += 6) {
    for (let x2 = 0; x2 < 300; x2 += 6) {
      const index = (y2 * 300 + x2) * 4;

      if (data[index + 3] > 128) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 6 + 2;

        particles.push({
          x: x,
          y: y,
          targetX: x + (x2 - 150) * 2,
          targetY: y + (y2 - 150) * 2,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 180,
          color: Math.random() * 360
        });
      }
    }
  }
}

function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  rockets.forEach((r, i) => {
    r.y -= r.speed;
    ctx.fillStyle = "white";
    ctx.fillRect(r.x, r.y, 2, 12);

    if (r.y <= r.targetY) {
      createExplosion(r.x, r.y, r.char);
      rockets.splice(i, 1);
    }
  });

  particles.forEach((p, i) => {
    p.life--;
    p.vx *= 0.95;
    p.vy *= 0.95;
    p.x += p.vx + (p.targetX - p.x) * 0.03;
    p.y += p.vy + (p.targetY - p.y) * 0.03;
    p.vy += 0.05;

    ctx.fillStyle = `hsl(${p.color},100%,60%)`;
    ctx.fillRect(p.x, p.y, 3, 3);

    if (p.life <= 0) particles.splice(i, 1);
  });

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
